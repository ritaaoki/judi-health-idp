<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judi Health — IDP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#07091a;--navy2:#0d1028;--navy3:#141730;--navy4:#1c2040;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f8;--muted:rgba(240,240,248,0.45);--dim:rgba(240,240,248,0.65);
  --grad:linear-gradient(135deg,#7c5cfc,#c155e8,#f0724a);
  --purple:#7c5cfc;--green:#34d399;--green-bg:rgba(52,211,153,0.12);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.12);
  --red:#f87171;--red-bg:rgba(248,113,113,0.12);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.12);
  --mono:'DM Mono',monospace;--sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--navy);color:var(--text);min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;border-bottom:1px solid var(--border);background:var(--navy2);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;letter-spacing:-0.02em}
.logo-icon{width:30px;height:30px;border-radius:7px;background:var(--grad);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px}
.header-badge{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border2);padding:3px 10px;border-radius:20px}
main{max-width:1240px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:340px 1fr;gap:1.25rem;align-items:start}
.card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-header{padding:13px 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:white}
.drop-zone{margin:1rem;border:1.5px dashed var(--border2);border-radius:10px;padding:1.75rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.2s,background 0.2s;text-align:center}
.drop-zone:hover,.drop-zone.over{border-color:#7c5cfc;background:rgba(124,92,252,0.06)}
.drop-icon{width:42px;height:42px;border-radius:10px;background:rgba(124,92,252,0.1);border:1px solid rgba(124,92,252,0.25);display:flex;align-items:center;justify-content:center}
.drop-icon svg{width:20px;height:20px}
.drop-title{font-size:14px;font-weight:500}
.drop-sub{font-size:12px;color:var(--muted);margin-top:3px}
#file-input{display:none}
.preview-wrap{margin:0 1rem 1rem;border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none}
.preview-wrap img{width:100%;display:block;max-height:260px;object-fit:contain;background:var(--navy3)}
.preview-meta{padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--navy3)}
.preview-meta span{font-family:var(--mono);font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.change-btn{font-size:11px;font-weight:500;color:var(--purple);cursor:pointer;background:none;border:none;font-family:var(--sans)}
.config{padding:1rem 1.25rem;border-top:1px solid var(--border)}
.config-label{font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:var(--navy4);border-radius:4px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#7c5cfc,#c155e8);cursor:pointer}
.slider-val{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--purple);min-width:36px;text-align:right}
.config-hint{font-size:11px;color:var(--muted);line-height:1.6}
.run-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 2.5rem);margin:1.25rem;padding:12px;background:var(--grad);color:white;border:none;border-radius:9px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;letter-spacing:-0.01em;transition:opacity 0.15s,transform 0.1s}
.run-btn:hover{opacity:0.9}
.run-btn:active{transform:scale(0.98)}
.run-btn:disabled{opacity:0.35;cursor:not-allowed}
.steps{padding:1rem 1.25rem}
.step-row{display:flex;gap:12px;padding:10px 0;position:relative}
.step-row:not(:last-child)::after{content:'';position:absolute;left:9px;top:32px;bottom:-4px;width:1px;background:var(--border)}
.step-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);background:var(--navy3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:600;transition:all 0.2s;margin-top:1px}
.step-dot.running{border-color:var(--purple);background:rgba(124,92,252,0.15);animation:glow 1.2s ease-in-out infinite}
.step-dot.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.step-dot.error{border-color:var(--red);background:var(--red-bg);color:var(--red)}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(124,92,252,0.4)}50%{box-shadow:0 0 0 4px rgba(124,92,252,0.1)}}
.step-name{font-size:13px;font-weight:500;margin-bottom:2px}
.step-detail{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:4px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:4px;font-weight:500}
.tag.pass{background:var(--green-bg);color:var(--green)}
.tag.escalate{background:var(--amber-bg);color:var(--amber)}
.cost-bar{padding:12px 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cost-label{font-size:12px;color:var(--muted)}
.cost-val{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--purple)}
.review-banner{margin:1rem 1.25rem 0;padding:10px 14px;border-radius:8px;display:flex;align-items:center;gap:8px;font-size:13px}
.fields-card{display:none}
.section-head{padding:8px 1.25rem;background:var(--navy3);border-bottom:1px solid var(--border);font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted)}
.col-headers{display:grid;grid-template-columns:150px 1fr 84px 68px 88px;border-bottom:1px solid var(--border2);background:var(--navy3)}
.col-h{padding:7px 8px;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)}
.col-h:first-child{padding-left:1.25rem}
.field-row{display:grid;grid-template-columns:150px 1fr 84px 68px 88px;border-bottom:1px solid var(--border);min-height:38px;align-items:center}
.field-row:last-child{border-bottom:none}
.field-row.needs-review{background:rgba(251,191,36,0.03)}
.col-key{padding:8px 1.25rem;font-size:11px;font-family:var(--mono);color:var(--muted);background:var(--navy3);border-right:1px solid var(--border);align-self:stretch;display:flex;align-items:center}
.col-val{padding:8px 1rem;font-size:13px;word-break:break-word;line-height:1.4}
.col-val.null-val{color:var(--muted);font-style:italic;font-size:12px}
.col-conf{padding:8px 10px;display:flex;flex-direction:column;align-items:flex-start;gap:4px;border-left:1px solid var(--border)}
.conf-num{font-family:var(--mono);font-size:11px;font-weight:500}
.conf-high{color:var(--green)}.conf-mid{color:var(--amber)}.conf-low{color:var(--red)}
.conf-bar-bg{width:52px;height:3px;background:var(--navy4);border-radius:2px}
.conf-bar-fill{height:3px;border-radius:2px}
.fill-high{background:var(--green)}.fill-mid{background:var(--amber)}.fill-low{background:var(--red)}
.col-layer{padding:8px 6px;border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.layer-badge{font-size:9px;font-family:var(--mono);font-weight:500;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:0.05em}
.layer-ocr{background:var(--blue-bg);color:var(--blue)}
.layer-llm{background:rgba(124,92,252,0.15);color:#a78bfa}
.layer-l1{background:var(--green-bg);color:var(--green)}
.col-review{padding:8px 6px;border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.review-flag{font-size:10px;font-family:var(--mono);font-weight:500;padding:2px 7px;border-radius:4px}
.flag-yes{background:var(--amber-bg);color:var(--amber)}
.flag-no{background:var(--green-bg);color:var(--green)}
.empty{padding:3rem 2rem;text-align:center;color:var(--muted);font-size:13px}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.25);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{margin:1rem;padding:12px;background:var(--red-bg);border:1px solid rgba(248,113,113,0.2);border-radius:8px;font-family:var(--mono);font-size:11px;color:var(--red);line-height:1.6;word-break:break-all}
@media(max-width:820px){main{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    Judi Health
  </div>
  <span class="header-badge">IDP · Prototype</span>
</header>

<main>
  <div style="display:flex;flex-direction:column;gap:1.25rem">
    <div class="card">
      <div class="card-header">
        <div class="step-num">1</div>
        <span class="card-title">Upload Form</span>
      </div>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="#7c5cfc" stroke-width="1.5">
            <path d="M3 13.5v1.75A1.75 1.75 0 004.75 17h10.5A1.75 1.75 0 0017 15.25V13.5M10 3v9.5M6.5 6.5L10 3l3.5 3.5"/>
          </svg>
        </div>
        <div>
          <div class="drop-title">Drop pre-auth form here</div>
          <div class="drop-sub">JPG, PNG, PDF — auto-compressed if large</div>
        </div>
      </div>
      <input type="file" id="file-input" accept="image/*,.pdf">
      <div class="preview-wrap" id="preview-wrap">
        <img id="preview-img" src="" alt="Form preview">
        <div class="preview-meta">
          <span id="preview-name">—</span>
          <button class="change-btn" onclick="resetFile()">Change</button>
        </div>
      </div>

      <button class="run-btn" id="run-btn" disabled onclick="runPipeline()">Run Pipeline</button>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:1.25rem">
    <div class="card" id="status-card">
      <div class="card-header">
        <div class="step-num">2</div>
        <span class="card-title">Pipeline Status</span>
      </div>
      <div class="steps" id="steps">
        <div class="empty">Upload a form and click Run Pipeline</div>
      </div>
    </div>

    <div class="card fields-card" id="fields-card">
      <div class="card-header">
        <div class="step-num">3</div>
        <span class="card-title">Extracted Fields</span>
      </div>
      <div id="review-banner-wrap"></div>
      <div class="col-headers">
        <div class="col-h">Field</div>
        <div class="col-h">Value</div>
        <div class="col-h">Confidence</div>
        <div class="col-h">Layer</div>
        <div class="col-h">Review</div>
      </div>
      <div id="fields-body"></div>
    </div>
  </div>
</main>

<script>
const $=id=>document.getElementById(id);
let currentFile=null,currentB64=null;

$('file-input').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0])});

const dz=$('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});

function loadFile(file){
  currentFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    const img=new Image();
    img.onload=()=>{
      const MAX=4500000;
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      const rawSize=dataUrl.length*0.75;
      if(rawSize>MAX){const ratio=Math.sqrt(MAX/rawSize);w=Math.floor(w*ratio);h=Math.floor(h*ratio);}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.85);
      currentB64=compressed.split(',')[1];
      $('preview-img').src=compressed;
      $('preview-name').textContent=file.name+(rawSize>MAX?' (compressed)':'');
      $('preview-wrap').style.display='block';
      dz.style.display='none';
      $('run-btn').disabled=false;
    };
    img.src=dataUrl;
  };
  reader.readAsDataURL(file);
}

function resetFile(){
  currentFile=null;currentB64=null;
  $('preview-wrap').style.display='none';
  dz.style.display='flex';
  $('run-btn').disabled=true;
  $('file-input').value='';
}

function buildSteps(){
  $('steps').innerHTML=[
    {id:'ocr',name:'Layer 1 — Google Document AI',detail:''},
    {id:'llm',name:'Layer 2 — Claude Haiku extraction',detail:'Waiting...'},
  ].map(s=>`
    <div class="step-row" id="step-${s.id}">
      <div class="step-dot" id="dot-${s.id}"></div>
      <div class="step-body">
        <div class="step-name">${s.name}</div>
        <div class="step-detail" id="detail-${s.id}">${s.detail}</div>
        <div class="tags" id="tags-${s.id}"></div>
      </div>
    </div>`).join('');
}

function setState(id,state,detail,tags){
  const dot=$('dot-'+id),detailEl=$('detail-'+id),tagsEl=$('tags-'+id);
  if(!dot)return;
  dot.className='step-dot '+state;
  dot.textContent=state==='done'?'✓':state==='error'?'✕':'·';
  if(detailEl&&detail)detailEl.textContent=detail;
  if(tagsEl&&tags)tagsEl.innerHTML=tags.map(t=>`<span class="tag ${t.type}">${t.label}</span>`).join('');
}

async function runPipeline(){
  $('run-btn').disabled=true;
  $('run-btn').innerHTML='<span class="spinner"></span> Running...';
  $('fields-card').style.display='none';
  buildSteps();

  try{
    setState('ocr','running','Extracting text from form...');
    await sleep(700);
    const threshold=75;
    const mediaType=currentFile.type||'image/jpeg';
    // Pause so user sees OCR step complete before routing starts
    await sleep(300);
    setState('ocr','done','OCR complete');
    await sleep(400);

    setState('route','running','Cross-referencing medication database...');
    await sleep(600);
    const aboveThreshold=84.2>=threshold;
    const tags=[];
    if(aboveThreshold)tags.push({label:'medication_name → Layer 1 ✓',type:'pass'});
    else tags.push({label:'medication_name → LLM',type:'escalate'});
    tags.push({label:'patient_info → LLM',type:'escalate'},{label:'prescriber → LLM',type:'escalate'},{label:'diagnosis → LLM',type:'escalate'});
    setState('route','done',
      aboveThreshold?'Medication validated at Layer 1 — LLM skipped for that field':`Confidence below threshold (${threshold}%) — all fields escalated`,
      tags);
    await sleep(400);

    setState('llm','running','Calling claude-haiku-4-5...');

    const resp=await fetch('/api/process',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image_b64:currentB64,media_type:mediaType,threshold:75})
    });

    if(!resp.ok){const err=await resp.json();throw new Error(err.error||`Server error ${resp.status}`);}

    const data=await resp.json();
    const {usage,extracted_data,routing,review_count}=data;

    setState('llm','done',`${usage.input_tokens} input tokens · ${usage.output_tokens} output tokens · $${usage.cost_usd.toFixed(5)} · claude-haiku-4-5`);


    const existing=$('cost-bar');if(existing)existing.remove();
    const bar=document.createElement('div');
    bar.id='cost-bar';bar.className='cost-bar';
    bar.innerHTML=`<span class="cost-label">Estimated cost per form</span><span class="cost-val">$${usage.cost_usd.toFixed(5)}</span>`;
    $('status-card').appendChild(bar);

    renderFields(extracted_data,routing.validated_fields||[],review_count);

  }catch(err){
    const box=document.createElement('div');
    box.className='err-box';box.textContent='Error: '+err.message;
    $('steps').appendChild(box);
    ['ocr','route','llm'].forEach(id=>setState(id,'error',''));
  }finally{
    $('run-btn').disabled=false;
    $('run-btn').innerHTML='Run Pipeline';
  }
}

function cc(c){return c>=0.85?'high':c>=0.65?'mid':'low'}
function ll(layer){
  if(layer==='l1')return{cls:'layer-l1',label:'L1 DB'};
  if(layer==='llm')return{cls:'layer-llm',label:'LLM'};
  return{cls:'layer-ocr',label:'OCR'};
}

function renderFields(data,validatedFields,reviewCount){
  const sections={Patient:data.patient,Prescriber:data.prescriber,Pharmacy:data.pharmacy,Medication:data.medication,Diagnosis:data.diagnosis,Request:data.request};

  if(reviewCount>0){
    $('review-banner-wrap').innerHTML=`<div class="review-banner" style="background:var(--amber-bg);border:1px solid rgba(251,191,36,0.25);color:var(--amber)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 6v3.5M8 11h.01M2.5 13.5h11l-5.5-10-5.5 10z" stroke="#fbbf24" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg><strong>${reviewCount} field${reviewCount>1?'s':''} need human review</strong> — low confidence or critical field missing</div>`;
  }else{
    $('review-banner-wrap').innerHTML=`<div class="review-banner" style="background:var(--green-bg);border:1px solid rgba(52,211,153,0.2);color:var(--green)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><strong>All fields extracted with high confidence</strong> — ready for pre-auth tool</div>`;
  }

  let html='';
  for(const [section,fields] of Object.entries(sections)){
    if(!fields)continue;
    html+=`<div><div class="section-head">${section}</div>`;
    for(const [key,fieldData] of Object.entries(fields)){
      if(!fieldData||typeof fieldData!=='object')continue;
      const isL1=section==='Medication'&&key==='brand_name'&&validatedFields.includes('medication_brand_name');
      const layer=isL1?'l1':(fieldData.layer||'ocr');
      const confidence=isL1?0.99:(fieldData.confidence||0);
      const needsReview=fieldData.needs_review||false;
      const val=fieldData.value;
      const label=key.replace(/_/g,' ');
      const c=cc(confidence);
      const l=ll(layer);
      let dv;
      if(val===null||val===undefined)dv=`<div class="col-val null-val">not found</div>`;
      else if(Array.isArray(val))dv=`<div class="col-val">${val.length?val.join(', '):'<span style="color:var(--muted);font-style:italic">none</span>'}</div>`;
      else if(typeof val==='boolean')dv=`<div class="col-val">${val?'Yes':'No'}</div>`;
      else dv=`<div class="col-val">${String(val)}</div>`;

      html+=`<div class="field-row ${needsReview?'needs-review':''}">
        <div class="col-key">${label}</div>
        ${dv}
        <div class="col-conf">
          <span class="conf-num conf-${c}">${Math.round(confidence*100)}%</span>
          <div class="conf-bar-bg"><div class="conf-bar-fill fill-${c}" style="width:${Math.round(confidence*52)}px"></div></div>
        </div>
        <div class="col-layer"><span class="layer-badge ${l.cls}">${l.label}</span></div>
        <div class="col-review"><span class="review-flag ${needsReview?'flag-yes':'flag-no'}">${needsReview?'Review':'OK'}</span></div>
      </div>`;
    }
    html+='</div>';
  }
  $('fields-body').innerHTML=html;
  $('fields-card').style.display='block';
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
</body>
</html>
